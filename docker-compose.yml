services:
  backend:
    build: ./platform-api/backend
    image: imaginehack-backend
    container_name: imaginehack-backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    restart: unless-stopped

  openclaw:
    build: .
    image: imaginehack-openclaw
    container_name: imaginehack-openclaw
    ports:
      - "8000:8000"
      - "8080:8080"
      - "18789:18789"
    env_file:
      - .env
    volumes:
      - openclaw-data:/root
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  openclaw-data:
