services:
  openclaw:
    build: .
    image: imaginehack-openclaw
    container_name: imaginehack-openclaw
    ports:
      - "8000:8000"
      - "8080:8080"
      - "18789:18789"
    env_file:
      - .env
    volumes:
      - openclaw-data:/root
    restart: unless-stopped

  baileys:
    build: ./platform-api/baileys
    container_name: imaginehack-baileys
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - baileys-auth:/app/auth
    restart: unless-stopped

volumes:
  openclaw-data:
  baileys-auth:
