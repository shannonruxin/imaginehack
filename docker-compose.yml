services:
  backend:
    build: ./platform-api/backend
    image: imaginehack-backend
    container_name: imaginehack-backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - BAILEYS_URL=http://host.docker.internal:3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  baileys:
    build: ./platform-api/baileys
    image: imaginehack-baileys
    container_name: imaginehack-baileys
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PLATFORM_API_URL=http://backend:8000
    volumes:
      - baileys-auth:/app/auth
    depends_on:
      - backend
    restart: unless-stopped

  openclaw:
    build: .
    image: imaginehack-openclaw
    container_name: imaginehack-openclaw
    ports:
      - "8000:8000"
      - "8080:8080"
      - "18789:18789"
    env_file:
      - .env
    volumes:
      - openclaw-data:/root
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  openclaw-data:
  baileys-auth:
